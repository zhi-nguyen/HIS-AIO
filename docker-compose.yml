version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: his_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=his_database
    volumes:
      - his_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: his_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: his_backend
    volumes:
      - ./backend:/app
      - tts_audio:/app/media/audio/tts
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      # Database settings from .env will be used, but explicit override here guarantees connection to docker service
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      # RAG Settings can be removed here if they are in .env, or kept as overrides
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    restart: always

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: his_celery_worker
    volumes:
      - ./backend:/app
      - tts_audio:/app/media/audio/tts
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info --concurrency=2
    restart: always

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: his_celery_beat
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - celery_worker
    command: celery -A config beat -l info
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: his_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLL_INTERVAL_DEFAULT=1000
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    stdin_open: true
    tty: true
    depends_on:
      - backend
    restart: always

  # ==========================================================================
  # PACS SERVER (Orthanc) — Lưu trữ và phân phối ảnh DICOM
  # ==========================================================================
  orthanc_db:
    image: postgres:16
    container_name: his_orthanc_db
    environment:
      - POSTGRES_USER=orthanc
      - POSTGRES_PASSWORD=orthanc_password
      - POSTGRES_DB=orthanc
    volumes:
      - orthanc_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 5s
      timeout: 5s
      retries: 5

  orthanc:
    image: orthancteam/orthanc:latest
    container_name: his_orthanc
    ports:
      - "4242:4242"   # DICOM port — nhận ảnh từ máy chụp
      - "8042:8042"   # HTTP REST API + DICOMweb
    volumes:
      - ./pacs_server/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./pacs_server/orthanc-lua:/etc/orthanc/lua:ro
      - orthanc_storage:/var/lib/orthanc/db
    depends_on:
      orthanc_db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: always

  # ==========================================================================
  # OHIF Viewer — Xem ảnh DICOM qua DICOMweb (nhúng iframe vào Next.js)
  # ==========================================================================
  ohif:
    image: ohif/app:v3.9.2
    container_name: his_ohif
    ports:
      - "3001:80"
    volumes:
      - ./pacs_server/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./pacs_server/ohif/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - orthanc
    restart: always

volumes:
  his_postgres_data:
  tts_audio:
  orthanc_postgres_data:
  orthanc_storage:

